<header class="top">
  <div class="container brand">

    <div class="logo">∑</div>

    <div>
      <h1>Foundation Math Hub</h1>
      <p>Anytime learning for foundational mathematics</p>
    </div>

  </div>
</header>

<main class="container">

  <!-- ================= PROGRESS PANEL ================= -->

  <section class="panel" id="progressPanel">

    <div class="row">
      <h2>Your Progress</h2>

      <button class="btn ghost" id="resetBtn">
        Reset
      </button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <p id="progressText">
      0 / 3 Main Topics Completed
    </p>

  </section>

  <!-- ================= HOME PAGE ================= -->

  <section class="panel" id="homePage">

    <h2>Choose a Topic</h2>

    <p class="muted">
      Select a topic to begin your learning journey.
    </p>

    <div class="grid" id="topicContainer"></div>

  </section>

  <!-- ================= SUBTOPIC PAGE ================= -->

  <section class="panel hidden" id="subtopicPage">

    <button class="btn ghost" id="backHome">
      ← Back to Topics
    </button>

    <h2 id="topicTitle"></h2>

    <p class="muted" id="topicDescription"></p>

    <div class="subgrid" id="subtopicContainer"></div>

  </section>

  <!-- ================= LESSON PAGE ================= -->

  <section class="panel hidden" id="lessonPage">

    <button class="btn ghost" id="backSubtopics">
      ← Back to Subtopics
    </button>

    <h2 id="lessonTitle"></h2>

    <p class="muted" id="lessonFlow"></p>

    <!-- Dynamic lesson content loads here -->
    <div id="lessonContent"></div>

  </section>

</main>
